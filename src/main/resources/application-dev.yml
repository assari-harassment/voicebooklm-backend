# 開発環境用設定（spring.profiles.active=dev）
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/voicebooklm
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: postgres
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: update  # 開発環境ではスキーマを自動更新
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # DevTools 設定
  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true

# Actuator を全公開（開発環境のみ）
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

# ログレベルを詳細に
logging:
  level:
    root: INFO
    com.assari.voicebooklm: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
