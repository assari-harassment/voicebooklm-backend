spring:
  application:
    name: voicebooklm-backend

  profiles:
    active: dev  # デフォルトは開発環境

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/voicebooklm}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate  # 本番環境は validate、Flyway がスキーマ管理
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  # Flyway マイグレーション設定
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true

  # 日本語設定
  messages:
    basename: messages
    encoding: UTF-8

  web:
    locale: ja_JP
    locale-resolver: fixed

  # Spring Boot 3.4 新機能: Virtual Threads
  # AI API呼び出しや音声処理などのI/Oバウンドな処理を高速化
  threads:
    virtual:
      enabled: true

  # 音声ファイルアップロード設定
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB      # 音声ファイル用に大きめに設定
      max-request-size: 100MB
      file-size-threshold: 1MB

  # Spring Security OAuth2 設定
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope:
              - email
              - profile
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub

# JWT 設定
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-for-development-only-must-be-at-least-256-bits}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:86400000}  # 1日（ミリ秒）
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:15552000000}  # 180日（ミリ秒）

# Google Cloud 設定
google:
  cloud:
    speech:
      credentials-path: ${GOOGLE_APPLICATION_CREDENTIALS:}
      project-id: ${GOOGLE_CLOUD_PROJECT_ID:}

# CORS 設定
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:*,http://192.168.*.*:*}
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true
  max-age: 3600

server:
  port: 8080

  # Spring Boot 3.4: Graceful Shutdown（デフォルトで有効）
  # 音声処理中のリクエストを安全に完了させる
  shutdown: graceful

  # タイムゾーン設定
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

# Spring Boot Actuator（モニタリング）
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

# Spring Boot 3.4 新機能: Structured Logging
# AI処理や音声変換のログを構造化して追跡しやすく
logging:
  structured:
    format:
      console: logstash  # または ecs
  level:
    root: INFO
    com.assari.voicebooklm: DEBUG

# タイムゾーン設定
spring.jackson.time-zone: Asia/Tokyo
spring.jackson.locale: ja_JP

# OpenAPI（Swagger）設定
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    try-it-out-enabled: true
    operations-sorter: alpha
    tags-sorter: alpha
    display-request-duration: true
  show-actuator: false
