spring:
  application:
    name: voicebooklm-backend

  profiles:
    active: dev  # デフォルトは開発環境

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/voicebooklm}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate  # 本番環境は validate、開発環境は update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  # 日本語設定
  messages:
    basename: messages
    encoding: UTF-8

  web:
    locale: ja_JP
    locale-resolver: fixed

  # Spring Boot 3.4 新機能: Virtual Threads
  # AI API呼び出しや音声処理などのI/Oバウンドな処理を高速化
  threads:
    virtual:
      enabled: true

  # 音声ファイルアップロード設定
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB      # 音声ファイル用に大きめに設定
      max-request-size: 100MB
      file-size-threshold: 1MB

  # Spring Security 設定
  security:
    user:
      name: admin
      password: ${ADMIN_PASSWORD:changeme}  # 本番環境では環境変数で設定

server:
  port: 8080

  # Spring Boot 3.4: Graceful Shutdown（デフォルトで有効）
  # 音声処理中のリクエストを安全に完了させる
  shutdown: graceful

  # タイムゾーン設定
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

# Spring Boot Actuator（モニタリング）
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

# Spring Boot 3.4 新機能: Structured Logging
# AI処理や音声変換のログを構造化して追跡しやすく
logging:
  structured:
    format:
      console: logstash  # または ecs
  level:
    root: INFO
    com.assari.voicebooklm: DEBUG

# タイムゾーン設定
spring.jackson.time-zone: Asia/Tokyo
spring.jackson.locale: ja_JP

# OpenAPI（Swagger）設定
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    try-it-out-enabled: true
    operations-sorter: alpha
    tags-sorter: alpha
    display-request-duration: true
  show-actuator: false
