  - folder: 学習/読書
    title: 読書メモ：デザイン思考
    transcription: |
      デザイン思考について読書メモ。5ステップは共感、問題定義、アイデア創出、プロトタイプ、テスト。
      共感フェーズでユーザーの潜在ニーズを理解するのが重要。
      観察してインタビューして分析する流れ。
    content: |
      # デザイン思考の5つのステップ

      デザイン思考のプロセスを通じて、**ユーザー中心の解決策**を見つけることができます。

      ## プロセス
      1. **共感** - ユーザーの潜在的なニーズを理解する
      2. **問題定義** - 本質的な課題を明確にする
      3. **アイデア創出** - 多様な解決策を考える
      4. **プロトタイプ** - 具体的な形にする
      5. **テスト** - フィードバックを得る

      ### ポイント
      特に*共感のフェーズ*では、ユーザーの潜在的なニーズを理解することが重要です。

      ```
      観察 → インタビュー → 分析
      ```
    tags: [学習, 読書, デザイン]

  - folder: 学習/読書
    title: 読書メモ：Clean Architecture
    transcription: |
      クリーンアーキテクチャの本を読んだ。依存関係は内側に向かうべき。
      ドメイン層は外部に依存しない。ユースケース層がビジネスロジック。
      インフラ層は外側。テストしやすい設計になる。
    content: |
      # Clean Architecture まとめ

      ## 基本原則
      **依存関係は常に内側に向かう**

      ## レイヤー構成
      ```
      [外側] インフラ層
           ↓
      [中間] ユースケース層
           ↓
      [内側] ドメイン層
      ```

      ## 各層の責務
      - **ドメイン層**: ビジネスルール、エンティティ
      - **ユースケース層**: アプリケーション固有のビジネスロジック
      - **インフラ層**: DB、外部API、フレームワーク

      ## メリット
      - テストしやすい
      - フレームワーク非依存
      - 変更に強い
    tags: [学習, 読書, アーキテクチャ]

  - folder: 学習/技術メモ
    title: Kotlinコルーチン入門
    transcription: |
      Kotlinのコルーチンについて勉強。suspendファンクションで非同期処理。
      launchは結果を返さない、asyncは結果を返す。
      スコープの管理が大事。キャンセレーションの伝播も理解した。
    content: |
      # Kotlin コルーチン入門

      ## 基本概念
      - `suspend` 関数: 中断可能な関数
      - コルーチンビルダー: `launch`, `async`

      ## launch vs async
      | ビルダー | 戻り値 | 用途 |
      |---------|--------|------|
      | launch | Job | Fire-and-forget |
      | async | Deferred<T> | 結果が必要な場合 |

      ## コード例
      ```kotlin
      suspend fun fetchData(): String {
          delay(1000)
          return "データ"
      }

      // launchの場合
      launch {
          fetchData()
      }

      // asyncの場合
      val result = async {
          fetchData()
      }.await()
      ```

      ## 重要ポイント
      - スコープ管理
      - キャンセレーションの伝播
      - 構造化並行性
    tags: [学習, Kotlin, 非同期]

  - folder: 学習/技術メモ
    title: PostgreSQLインデックス最適化
    transcription: |
      PostgreSQLのインデックスについて調べた。B-treeがデフォルト。
      複合インデックスは左端のカラムから使われる。
      EXPLAINでクエリプランを確認。Seq Scanが出たらインデックス追加を検討。
    content: |
      # PostgreSQL インデックス最適化

      ## インデックスの種類
      - **B-tree**: デフォルト、範囲検索に強い
      - **Hash**: 等価比較のみ
      - **GIN**: 配列、全文検索
      - **GiST**: 地理データ

      ## 複合インデックスのルール
      ```sql
      CREATE INDEX idx_users ON users(company_id, created_at);
      ```
      → `company_id` のみ、または `company_id + created_at` で有効

      ## パフォーマンス確認
      ```sql
      EXPLAIN ANALYZE SELECT * FROM users WHERE company_id = 1;
      ```

      ## チェックポイント
      - Seq Scan → インデックス追加を検討
      - Index Scan → OK
      - Index Only Scan → 最適
    tags: [学習, データベース, PostgreSQL]

  - folder: 学習/資格勉強
    title: AWS SAA試験対策メモ
    transcription: |
      AWSソリューションアーキテクト試験の勉強。
      VPCのサブネット設計が出題頻度高い。
      パブリックサブネットとプライベートサブネットの違い。
      NATゲートウェイはプライベートからインターネットへの接続用。
    content: |
      # AWS SAA 試験対策

      ## VPC 重要ポイント

      ### サブネットの種類
      - **パブリックサブネット**: IGWへのルートあり
      - **プライベートサブネット**: IGWへのルートなし

      ### NATゲートウェイ
      - プライベートサブネット → インターネット接続用
      - パブリックサブネットに配置

      ## 頻出サービス
      1. EC2 / ELB / Auto Scaling
      2. S3 / CloudFront
      3. RDS / DynamoDB
      4. Lambda / API Gateway

      ## 試験のコツ
      - 「最もコスト効率が良い」→ サーバーレス検討
      - 「高可用性」→ マルチAZ
      - 「セキュリティ」→ IAM、VPC設計
    tags: [学習, AWS, 資格]

