  - folder: プロジェクト/アプリ開発
    title: API設計メモ
    transcription: |
      RESTful APIの設計。リソース指向で設計する。
      エンドポイントは名詞で。動詞はHTTPメソッドで表現。
      バージョニングはURLに含める。エラーレスポンスは統一フォーマットで。
    content: |
      # API設計ガイドライン

      ## 基本原則
      - リソース指向
      - HTTPメソッドで操作を表現

      ## エンドポイント設計
      ```
      GET    /api/v1/memos      # 一覧取得
      POST   /api/v1/memos      # 作成
      GET    /api/v1/memos/:id  # 詳細取得
      PATCH  /api/v1/memos/:id  # 更新
      DELETE /api/v1/memos/:id  # 削除
      ```

      ## エラーレスポンス
      ```json
      {
        "error": {
          "code": "NOT_FOUND",
          "message": "リソースが見つかりません"
        }
      }
      ```

      ## バージョニング
      URLに含める: `/api/v1/...`
    tags: [開発, API, 設計]

