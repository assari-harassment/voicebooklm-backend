      キーキャップはPBTで。はんだ付けが必要だから練習しないと。
    content: |
      # 自作キーボード計画

      ## 検討中のキット
      **Corne Cherry**
      - 分割キーボード
      - 40%レイアウト（42キー）

      ## パーツ選定
      | パーツ | 選択 |
      |--------|------|
      | スイッチ | Gateron Yellow |
      | キーキャップ | PBT |
      | ケーブル | TRRS |

      ## 必要な作業
      1. はんだ付け練習
      2. ファームウェア書き込み（QMK）
      3. キーマップ設定

      ## 予算
      - キット: 約15,000円
      - スイッチ: 約3,000円
      - キーキャップ: 約5,000円
      - **合計**: 約23,000円
