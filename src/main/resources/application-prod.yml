# 本番環境用設定（spring.profiles.active=prod）
spring:
  jpa:
    hibernate:
      ddl-auto: validate  # 本番環境ではスキーマ変更を許可しない
    show-sql: false

  devtools:
    restart:
      enabled: false

# Actuator は最小限のみ公開
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never

# 本番環境のログは WARNING 以上
logging:
  level:
    root: WARN
    com.assari.voicebooklm: INFO

# 本番環境 CORS 設定
# 環境変数 CORS_ALLOWED_ORIGINS で許可するオリジンを設定
cors:
  allowed-origin-patterns:
    - ${CORS_ALLOWED_ORIGINS:https://voicebooklm.example.com}
