services:
  postgres:
    image: postgres:16-alpine
    container_name: voicebooklm-postgres
    environment:
      POSTGRES_DB: voicebooklm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: Asia/Tokyo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # 将来的に追加する可能性のあるサービス
  # redis:
  #   image: redis:7-alpine
  #   container_name: voicebooklm-redis
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis_data:/data
  #   restart: unless-stopped

volumes:
  postgres_data:
    driver: local
